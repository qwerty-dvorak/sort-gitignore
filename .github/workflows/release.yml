name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-lsp:
    name: Build LSP (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            asset_name: git_ignore-lsp-x86_64-unknown-linux-gnu.tar.gz

          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            asset_name: git_ignore-lsp-aarch64-unknown-linux-gnu.tar.gz

          - target: x86_64-apple-darwin
            os: macos-latest
            asset_name: git_ignore-lsp-x86_64-apple-darwin.tar.gz

          - target: aarch64-apple-darwin
            os: macos-latest
            asset_name: git_ignore-lsp-aarch64-apple-darwin.tar.gz

          - target: x86_64-pc-windows-msvc
            os: windows-latest
            asset_name: git_ignore-lsp-x86_64-pc-windows-msvc.tar.gz

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install aarch64 Linux cross-compiler
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV

      - name: Build
        run: cargo build -p git_ignore-lsp --release --target ${{ matrix.target }}

      - name: Package (Unix)
        if: matrix.os != 'windows-latest'
        run: |
          tar -czf ${{ matrix.asset_name }} \
            -C target/${{ matrix.target }}/release \
            git_ignore-lsp

      - name: Package (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          tar -czf ${{ matrix.asset_name }} `
            -C target/${{ matrix.target }}/release `
            git_ignore-lsp.exe

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: ${{ matrix.asset_name }}

  build-wasm:
    name: Build extension.wasm
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-wasip1

      - name: Build extension WASM
        run: cargo build --release --target wasm32-wasip1

      - name: Copy WASM artifact
        run: cp target/wasm32-wasip1/release/sort_git_ignore_extension.wasm extension.wasm

      - uses: actions/upload-artifact@v4
        with:
          name: extension.wasm
          path: extension.wasm

  release:
    name: Create GitHub Release
    needs: [build-lsp, build-wasm]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          prerelease: false
          files: artifacts/*
